<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>رادار الصفقات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1220; --card:#111a2c; --card2:#0e1626; --line:#1e2a44;
  --txt:#e8eefc; --mut:#8fa3c8; --acc:#22d3a5; --acc2:#38bdf8;
  --warn:#fbbf24; --bad:#f87171; --chip:#182541;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Tajawal',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:
  radial-gradient(60% 40% at 85% -10%,rgba(56,189,248,.14),transparent 60%),
  radial-gradient(50% 35% at 10% -10%,rgba(34,211,165,.12),transparent 60%);pointer-events:none}
a{color:inherit;text-decoration:none}
button,input,select{font-family:inherit;font-size:1rem}
.wrap{max-width:1280px;margin:0 auto;padding:0 14px 90px}

/* ---------- lock screen ---------- */
#lock{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:50}
.lockcard{width:min(92vw,380px);background:linear-gradient(180deg,var(--card),var(--card2));
  border:1px solid var(--line);border-radius:22px;padding:38px 28px;text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.5)}
.lockicon{width:74px;height:74px;margin:0 auto 18px;border-radius:20px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(34,211,165,.18),rgba(56,189,248,.18));border:1px solid var(--line);font-size:2rem}
.lockcard h1{font-size:1.35rem;font-weight:800;margin-bottom:6px}
.lockcard p{color:var(--mut);font-size:.9rem;margin-bottom:22px}
#pin{width:100%;padding:14px;border-radius:14px;border:1px solid var(--line);background:#0a1120;color:var(--txt);
  text-align:center;font-size:1.5rem;letter-spacing:.45em;direction:ltr}
#pin:focus{outline:2px solid var(--acc2);border-color:transparent}
#enter{width:100%;margin-top:14px;padding:14px;border:none;border-radius:14px;font-weight:800;font-size:1.05rem;cursor:pointer;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#05263b}
#enter:disabled{opacity:.55}
.remember{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:14px;color:var(--mut);font-size:.85rem}
#lockmsg{min-height:22px;margin-top:12px;font-size:.85rem;color:var(--bad)}
.shake{animation:sh .4s}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(8px)}75%{transform:translateX(-8px)}}

/* ---------- header ---------- */
header{padding:22px 0 12px}
.brandrow{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  background:linear-gradient(135deg,rgba(34,211,165,.2),rgba(56,189,248,.2));border:1px solid var(--line)}
.brand h1{font-size:1.3rem;font-weight:800}
.brand small{display:block;color:var(--mut);font-weight:400;font-size:.78rem}
.refreshctl{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.refresh-button{border:1px solid rgba(34,211,165,.45);border-radius:12px;padding:10px 15px;cursor:pointer;
  background:linear-gradient(135deg,rgba(34,211,165,.22),rgba(56,189,248,.2));color:var(--txt);font-weight:800}
.refresh-button.full{border-color:rgba(251,191,36,.5);background:linear-gradient(135deg,rgba(251,191,36,.18),rgba(248,113,113,.12))}
.refresh-button:disabled{opacity:.55;cursor:wait}
#refreshStatus{max-width:300px;color:var(--mut);font-size:.76rem;line-height:1.4}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.stat{background:var(--chip);border:1px solid var(--line);border-radius:12px;padding:8px 14px;font-size:.82rem;color:var(--mut)}
.stat b{color:var(--txt);font-size:.95rem;margin-inline-start:6px}

/* ---------- filters ---------- */
#filters{position:sticky;top:0;z-index:20;background:rgba(11,18,32,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:12px 0;margin:10px -14px 16px;padding-inline:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:760px){.frow{grid-template-columns:repeat(5,minmax(0,1fr))}}
@media(min-width:1120px){.frow{grid-template-columns:2fr repeat(8,minmax(90px,1fr)) auto}}
#q{grid-column:1/-1}
@media(min-width:760px){#q{grid-column:auto}}
.f{padding:11px 12px;border-radius:12px;border:1px solid var(--line);background:var(--card2);color:var(--txt);width:100%}
.f:focus{outline:2px solid var(--acc2)}
#reset{background:var(--chip);border:1px solid var(--line);border-radius:12px;color:var(--mut);padding:11px 16px;cursor:pointer;white-space:nowrap}
.count{color:var(--mut);font-size:.85rem;margin-top:10px}
.count b{color:var(--acc)}
.source-note{margin-top:9px;padding:9px 12px;border:1px solid rgba(56,189,248,.3);border-radius:10px;
  background:rgba(56,189,248,.08);color:#b9d9ef;font-size:.8rem;line-height:1.5}

/* ---------- cards ---------- */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;
  padding:16px;display:flex;flex-direction:column;gap:10px;transition:transform .15s,border-color .15s}
.card:active{transform:scale(.985)}
@media(hover:hover){.card:hover{border-color:#2c3e66;transform:translateY(-2px)}}
.top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flag{font-size:1.15rem}
.chip{font-size:.72rem;padding:3px 9px;border-radius:99px;background:var(--chip);border:1px solid var(--line);color:var(--mut)}
.badge{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:99px}
.b-real{background:rgba(34,211,165,.14);color:var(--acc);border:1px solid rgba(34,211,165,.35)}
.b-est{background:rgba(251,191,36,.12);color:var(--warn);border:1px solid rgba(251,191,36,.3)}
.b-live{background:rgba(34,211,165,.22);color:#7df5d4;border:1px solid rgba(34,211,165,.5);font-weight:800}
.b-new{background:rgba(56,189,248,.2);color:#8edcff;border:1px solid rgba(56,189,248,.55);font-weight:800}
.b-opened{background:rgba(167,139,250,.16);color:#c4b5fd;border:1px solid rgba(167,139,250,.42)}
.card.is-new{border-color:rgba(56,189,248,.62);box-shadow:0 0 0 1px rgba(56,189,248,.12)}
.card.is-visited{border-color:rgba(167,139,250,.34)}
.title{font-size:.95rem;font-weight:500;line-height:1.5;color:var(--txt);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.8em}
.profit{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.profit .dz{font-size:1.45rem;font-weight:800;color:var(--acc)}
.profit .eu{color:var(--mut);font-size:.85rem}
.roi{margin-inline-start:auto;font-weight:800;font-size:.85rem;padding:4px 10px;border-radius:10px}
.roi.hi{background:rgba(34,211,165,.14);color:var(--acc)}
.roi.md{background:rgba(56,189,248,.13);color:var(--acc2)}
.roi.lo{background:rgba(251,191,36,.12);color:var(--warn)}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:.82rem;color:var(--mut);
  background:#0a1120;border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.meta div b{color:var(--txt);font-weight:500}
.foot{display:flex;align-items:center;gap:8px;margin-top:auto}
.src{font-size:.75rem;color:var(--mut)}
.open{margin-inline-start:auto;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#05263b;
  font-weight:800;font-size:.85rem;padding:9px 18px;border-radius:11px}
.open.unavailable{background:var(--chip);color:var(--mut);cursor:not-allowed;opacity:.72}
.open:visited{color:#6b215f}

/* ---------- pagination ---------- */
#pager{display:flex;gap:10px;justify-content:center;align-items:center;margin:26px 0}
#pager button{background:var(--chip);color:var(--txt);border:1px solid var(--line);border-radius:12px;padding:10px 20px;cursor:pointer;font-weight:700}
#pager button:disabled{opacity:.35;cursor:default}
#pageinfo{color:var(--mut);font-size:.9rem}
footer{color:var(--mut);text-align:center;font-size:.78rem;padding:10px 0 30px}
.hidden{display:none!important}
#loading{text-align:center;color:var(--mut);padding:60px 0}
.spin{width:38px;height:38px;border:3px solid var(--line);border-top-color:var(--acc);border-radius:50%;
  margin:0 auto 14px;animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="lock">
  <div class="lockcard" id="lockcard">
    <div class="lockicon">🚘</div>
    <h1>رادار الصفقات</h1>
    <p>أدخل الرقم السري لفتح اللوحة</p>
    <input id="pin" type="password" inputmode="numeric" autocomplete="off" placeholder="••••••••">
    <button id="enter">دخول</button>
    <label class="remember"><input type="checkbox" id="remember"> تذكرني على هذا الجهاز</label>
    <div id="lockmsg"></div>
  </div>
</div>

<div class="wrap hidden" id="app">
  <header>
    <div class="brandrow">
      <div class="brand">
        <div class="logo">🚘</div>
        <div>
          <h1>رادار الصفقات <small>مصادر شنغن — محسوبة بالجمارك والسوق الجزائري</small></h1>
        </div>
      </div>
      <div class="refreshctl">
        <button class="refresh-button" id="refreshBtn" type="button">⚡ جلب وتحديث ذكي</button>
        <button class="refresh-button full" id="fullRefreshBtn" type="button">🌍 تحديث شامل</button>
        <span id="refreshStatus">التحديث الذكي يجلب عروضًا جديدة؛ الشامل يمر على كل مسارات المصادر</span>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <div id="filters">
    <div class="frow">
      <input class="f" id="q" placeholder="🔍 ابحث: موديل، عنوان…">
      <select class="f" id="fc"><option value="">كل الدول</option></select>
      <select class="f" id="fsrc"><option value="">كل المصادر</option></select>
      <select class="f" id="ff"><option value="">كل الوقود</option></select>
      <select class="f" id="fy"><option value="">كل السنوات</option></select>
      <select class="f" id="fp">
        <option value="">كل الأسعار</option>
        <option value="0-10000">حتى 10,000 €</option>
        <option value="10000-15000">10—15 ألف €</option>

        <option value="30000-999999">فوق 30 ألف €</option>

      <input class="f" id="fb" type="number" inputmode="numeric" min="0" step="50000" placeholder="💰 ميزانيتي القصوى (دج)" title="أقصى مبلغ أستطيع دفعه — يُظهر فقط ما تكلفة وصوله للجزائر أقل منه">
      <button id="binfo" class="f" style="cursor:default;background:transparent;border:0;color:var(--mut)">= تكلفة الوصول ≤ ميزانيتك</button>
      <select class="f" id="fs">
        <option value="best">✨ الأفضل موصى به</option>
        <option value="profit">🏆 أعلى ربح</option>
        <option value="roi">📈 أعلى عائد ROI</option>
        <option value="price">💶 الأرخص سعراً</option>
        <option value="year">🗓️ الأحدث سنة</option>
        <option value="km">🛣️ الأقل كيلومتراً</option>
      </select>
      <button id="reset">↺ مسح</button>
    </div>
    <div class="frow" style="margin-top:8px">
      <label class="f" style="display:flex;gap:8px;align-items:center;cursor:pointer">
        <input type="checkbox" id="ft"> موثّق فقط (سعر جزائري حقيقي)
      </label>
      <label class="f" style="display:flex;gap:8px;align-items:center;cursor:pointer">
        <input type="checkbox" id="flive" checked> رابط الإعلان مؤكّد حيًا فقط
      </label>
      <label class="f" style="display:flex;gap:8px;align-items:center;cursor:pointer">
        <input type="checkbox" id="fnew"> العروض الجديدة فقط

      <label class="f" style="display:flex;gap:8px;align-items:center;cursor:pointer">

    <button id="prev">‹ السابق</button>
    <span id="pageinfo"></span>
    <button id="next">التالي ›</button>
  </div>
  <footer id="coverageNote">كل مصدر شنغن مؤهل يملك مقعدًا في اللوحة · لا يظهر المصدر إن لم توجد له صفقة مؤهلة للجزائر</footer>
</div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const FLAGS={DE:"🇩🇪",FR:"🇫🇷",ES:"🇪🇸",IT:"🇮🇹",AT:"🇦🇹",PL:"🇵🇱",CZ:"🇨🇿",BG:"🇧🇬",PT:"🇵🇹",BE:"🇧🇪",NL:"🇳🇱",RO:"🇷🇴",FI:"🇫🇮",SE:"🇸🇪",DK:"🇩🇰",SK:"🇸🇰",NO:"🇳🇴",LV:"🇱🇻",LU:"🇱🇺",SI:"🇸🇮",HR:"🇭🇷",CH:"🇨🇭",HU:"🇭🇺",GR:"🇬🇷",EE:"🇪🇪",LT:"🇱🇹",IS:"🇮🇸",LI:"🇱🇮",MT:"🇲🇹"};
const CN={DE:"ألمانيا",FR:"فرنسا",ES:"إسبانيا",IT:"إيطاليا",AT:"النمسا",PL:"بولندا",CZ:"التشيك",BG:"بلغاريا",PT:"البرتغال",BE:"بلجيكا",NL:"هولندا",RO:"رومانيا",FI:"فنلندا",SE:"السويد",DK:"الدانمارك",SK:"سلوفاكيا",NO:"النرويج",LV:"لاتفيا",LU:"لوكسمبورغ",SI:"سلوفينيا",HR:"كرواتيا",CH:"سويسرا",HU:"المجر",GR:"اليونان",EE:"إستونيا",LT:"ليتوانيا",IS:"آيسلندا",LI:"ليختنشتاين",MT:"مالطا"};
const FUEL_AR=f=>{f=(f||"").toLowerCase();
  if(/hyb|هجين/.test(f))return"هايبرد";
  if(/petrol|gasoline|benzin|essence|بنزين/.test(f)||f==="")return"بنزين";
  return f||"—"};
const nf=new Intl.NumberFormat("fr-FR",{maximumFractionDigits:0});
const fmtDz=v=>nf.format(Math.round(v))+" دج";
const fmtEu=v=>nf.format(Math.round(v))+" €";
const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const safeUrl=v=>{try{const u=new URL(String(v||""));return /^(https?):$/.test(u.protocol)?u.href:"#";}catch(e){return"#";}};
const CONTROL_API="https://sonardeals-radar-control.krtabd120.workers.dev";
const CONTROL_SALT=new TextEncoder().encode("sonardeals-radar-control-v1");

let DATA=[],VIEW=[],page=1,SOURCE_META=new Map(),VERIFICATION_FRESH=false,ACTIVE_PIN="";
let KNOWN_IDS=new Set(),NEW_IDS=new Set(),VISITED_IDS=new Set();
const PER=60,LIVE_VERIFICATION_MAX_AGE_MS=6*60*60*1000;
const KNOWN_KEY="dzr-known-offers-v1",NEW_KEY="dzr-new-offers-v1",VISITED_KEY="dzr-visited-offers-v1";
const HISTORY_LIMIT=50000;

function readIdSet(key){
  try{
    const value=JSON.parse(localStorage.getItem(key)||"[]");
    return new Set(Array.isArray(value)?value.map(String).filter(Boolean):[]);
  }catch(e){return new Set();}
}
function writeIdSet(key,values){
  try{localStorage.setItem(key,JSON.stringify([...values].slice(-HISTORY_LIMIT)));}catch(e){}
}
function initializeOfferHistory(){
  const ids=DATA.map(o=>String(o.id||"")).filter(Boolean);
  const current=new Set(ids);
  VISITED_IDS=readIdSet(VISITED_KEY);
  const hasBaseline=localStorage.getItem(KNOWN_KEY)!==null;
  KNOWN_IDS=hasBaseline?readIdSet(KNOWN_KEY):new Set(ids);
  NEW_IDS=hasBaseline?readIdSet(NEW_KEY):new Set();
  if(hasBaseline){
    for(const id of ids){
      if(!KNOWN_IDS.has(id)&&!VISITED_IDS.has(id))NEW_IDS.add(id);
      KNOWN_IDS.add(id);
    }
  }
  NEW_IDS=new Set([...NEW_IDS].filter(id=>current.has(id)&&!VISITED_IDS.has(id)));
  writeIdSet(KNOWN_KEY,KNOWN_IDS);writeIdSet(NEW_KEY,NEW_IDS);writeIdSet(VISITED_KEY,VISITED_IDS);
}
function updateHistoryStats(){
  const current=new Set(DATA.map(o=>String(o.id||"")));
  const fresh=[...NEW_IDS].filter(id=>current.has(id)).length;
  const opened=[...VISITED_IDS].filter(id=>current.has(id)).length;
  if($("newStat"))$("newStat").textContent=nf.format(fresh);
  if($("openedStat"))$("openedStat").textContent=nf.format(opened);
}
function recordVisited(id){
  id=String(id||"");if(!id)return;
  VISITED_IDS.add(id);NEW_IDS.delete(id);KNOWN_IDS.add(id);
  writeIdSet(VISITED_KEY,VISITED_IDS);writeIdSet(NEW_KEY,NEW_IDS);writeIdSet(KNOWN_KEY,KNOWN_IDS);
  updateHistoryStats();
}

/* ---------- crypto ---------- */
async function deriveKey(pin,salt){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pin),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:310000,hash:"SHA-256"},km,
    {name:"AES-GCM",length:256},false,["decrypt"]);
}
async function gunzip(buf){
  const ds=new DecompressionStream("gzip");
  const stream=new Response(buf).body.pipeThrough(ds);
  return new Response(stream).arrayBuffer();
}
async function unlock(pin){
  const res=await fetch("data.enc?v="+Date.now(),{cache:"no-store"});
  if(!res.ok)throw new Error("net");
  const raw=new Uint8Array(await res.arrayBuffer());
  if(new TextDecoder().decode(raw.slice(0,5))!=="DZAR1")throw new Error("fmt");
  const salt=raw.slice(5,21),iv=raw.slice(21,33),ct=raw.slice(33);
  const key=await deriveKey(pin,salt);
  let plain;
  try{plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);}
  catch(e){throw new Error("pin");}
  const json=new TextDecoder().decode(await gunzip(plain));
  return JSON.parse(json);
}

/* ---------- lock flow ---------- */
async function tryUnlock(pin,silent){
  $("enter").disabled=true;$("lockmsg").textContent=silent?"":"جاري الفتح…";$("lockmsg").style.color="var(--mut)";
  try{
    const payload=await unlock(pin);
    ACTIVE_PIN=pin;
    if($("remember").checked)localStorage.setItem("dzk",pin);
    sessionStorage.setItem("dzk",pin);
    boot(payload);
  }catch(e){
    $("enter").disabled=false;
    if(silent){localStorage.removeItem("dzk");sessionStorage.removeItem("dzk");return;}
    $("lockmsg").style.color="var(--bad)";
    $("lockmsg").textContent = e.message==="pin"?"الرقم السري غير صحيح":
      e.message==="net"?"تعذر تحميل البيانات — تحقق من الاتصال":"خطأ غير متوقع";
    $("lockcard").classList.add("shake");setTimeout(()=>$("lockcard").classList.remove("shake"),450);
  }
}
$("enter").onclick=()=>{const p=$("pin").value.trim();if(p)tryUnlock(p,false);};
$("pin").addEventListener("keydown",e=>{if(e.key==="Enter"){const p=$("pin").value.trim();if(p)tryUnlock(p,false);}});
if(typeof DecompressionStream==="undefined"){
  $("lockmsg").textContent="متصفحك قديم — حدّث كروم/سفاري";
}else{
  const saved=localStorage.getItem("dzk")||sessionStorage.getItem("dzk");
  if(saved){$("remember").checked=!!localStorage.getItem("dzk");tryUnlock(saved,true);}
}

/* ---------- app ---------- */
function boot(payload){
  DATA=payload.offers;
  initializeOfferHistory();
  $("lock").classList.add("hidden");$("app").classList.remove("hidden");
  const dataUpd=new Date(payload.data_generated_at_utc||payload.updated_utc);
  const boardBuilt=new Date(payload.board_built_at_utc||payload.updated_utc);
  const fullRefresh=new Date(payload.last_full_refresh_at_utc||"");
  const validationAt=new Date(payload.validation&&payload.validation.generated_at||"");
  const validationAge=Date.now()-validationAt.getTime();
  VERIFICATION_FRESH=!Number.isNaN(validationAt.getTime())&&
    validationAge>=-5*60*1000&&validationAge<=LIVE_VERIFICATION_MAX_AGE_MS;
  const fmtTime=value=>Number.isNaN(value.getTime())?"غير معروف":value.toLocaleString("ar-DZ",{dateStyle:"short",timeStyle:"short"});
  const avg=DATA.length?DATA.reduce((a,o)=>a+o.pr,0)/DATA.length:0;
  const connected=payload.connected_source_count||new Set(DATA.map(o=>o.s).filter(Boolean)).size;
  const liveCount=payload.live_source_count||connected;
  const extraCount=payload.extra_source_count||0;
  const displayed=payload.displayed_source_count||new Set(DATA.map(o=>o.s).filter(Boolean)).size;
  const displayedCountries=payload.displayed_country_count||new Set(DATA.map(o=>o.c).filter(Boolean)).size;
  const connectedCountries=payload.connected_country_count||displayedCountries;
  const universe=payload.universe_unique_offers||payload.selection_universe_count||payload.live_inventory_count||0;
  const qualifiedUniverse=payload.qualified_universe_offers||payload.qualified_universe_planets||0;
  $("stats").innerHTML=
    `<div class="stat">أفضل العروض المعروضة<b>${nf.format(DATA.length)}</b></div>`+
    `<div class="stat">جديدة لم ترها<b id="newStat">0</b></div>`+
    `<div class="stat">فتحتها سابقًا<b id="openedStat">0</b></div>`+
    (universe?`<div class="stat">مخزون فريد فُحص ورتّب<b>${nf.format(universe)}</b></div>`:"")+
    (qualifiedUniverse?`<div class="stat">مرشح مؤهل<b>${nf.format(qualifiedUniverse)}</b></div>`:"")+
    `<div class="stat">المصادر المؤهلة<b>${displayed}</b></div>`+
    `<div class="stat">المصادر المرتبطة<b>${connected}</b></div>`+
    `<div class="stat">داخل مخزون الصفقات<b>${liveCount}</b></div>`+
    (extraCount?`<div class="stat">مراقبة أو تهيئة<b>${extraCount}</b></div>`:"")+
    `<div class="stat">تغطية دول شنغن<b>${connectedCountries}/${payload.schengen_country_total||29}</b></div>`+
    `<div class="stat">دول بصفقات مؤهلة<b>${displayedCountries}/${connectedCountries}</b></div>`+
    `<div class="stat">متوسط الربح<b>${fmtEu(avg)}</b></div>`+
    `<div class="stat">آخر تصنيف للبيانات<b>${fmtTime(dataUpd)}</b></div>`+
    `<div class="stat">آخر حصاد شامل<b>${fmtTime(fullRefresh)}</b></div>`+
    `<div class="stat">بناء اللوحة<b>${fmtTime(boardBuilt)}</b></div>`;
  updateHistoryStats();
  const availableCountries=new Set(DATA.map(o=>o.c).filter(Boolean));
  const connectedCountrySet=new Set(Object.keys(payload.connected_country_counts||{}));
  const cs=Object.keys(FLAGS).sort();
  $("fc").innerHTML='<option value="">كل الدول</option>'+cs.map(c=>{
    const available=availableCountries.has(c);
    const note=available?"":connectedCountrySet.has(c)?" — متصلة، لا صفقة مؤهلة الآن":" — لا بيانات مرتبطة حاليًا";
    return `<option value="${esc(c)}"${available?"":" disabled"}>${FLAGS[c]||""} ${esc(CN[c]||c)}${note}</option>`;
  }).join("");
  const displayedSources=new Set(DATA.map(o=>o.s).filter(Boolean));
  SOURCE_META=new Map((payload.extra_sources||[]).map(record=>[record.name,record]));
  const sources=(Array.isArray(payload.connected_sources)?payload.connected_sources:[...displayedSources])
    .filter(Boolean).sort((a,b)=>a.localeCompare(b));
  $("fsrc").innerHTML='<option value="">كل المصادر</option>'+sources.map(s=>{
    const available=displayedSources.has(s);
    const extra=SOURCE_META.get(s);
    const note=available?"":extra?` — ${extra.note_ar}`:" — متصل، لا صفقة مؤهلة الآن";
    return `<option value="${esc(s)}">${esc(s)}${esc(note)}</option>`;
  }).join("");
  const fs=[...new Set(DATA.map(o=>FUEL_AR(o.f)))].sort();
  $("ff").innerHTML='<option value="">كل الوقود</option>'+fs.map(f=>`<option>${esc(f)}</option>`).join("");
  const ys=[...new Set(DATA.map(o=>o.y).filter(y=>y>2000))].sort((a,b)=>b-a);
  $("fy").innerHTML='<option value="">كل السنوات</option>'+ys.map(y=>`<option>${y}</option>`).join("");
  ["q","fc","fsrc","ff","fy","fp","fs","fb"].forEach(id=>$(id).addEventListener("input",()=>{page=1;apply();}));
  ["ft","flive","fnew","funseen"].forEach(id=>$(id).addEventListener("change",()=>{page=1;apply();}));
  $("fnew").checked=NEW_IDS.size>0;
  $("reset").onclick=()=>{["q","fc","fsrc","ff","fy","fp","fb"].forEach(id=>$(id).value="");$("fs").value="best";$("ft").checked=false;$("flive").checked=true;$("fnew").checked=false;$("funseen").checked=false;page=1;apply();};
  $("prev").onclick=()=>{page--;render();scrollTo({top:0,behavior:"smooth"});};
  $("next").onclick=()=>{page++;render();scrollTo({top:0,behavior:"smooth"});};
  $("grid").onclick=event=>{
    const link=event.target.closest("a.open[data-offer-id]");
    if(!link)return;
    recordVisited(link.dataset.offerId);
    setTimeout(()=>{page=1;apply();},0);
  };
  $("loading").classList.add("hidden");
  const deferredSources=payload.deferred_sources||[];
  const deferred=deferredSources.length;
  const watchOnly=payload.watch_only_sources||[];
  const staging=payload.staging_sources||[];
  const withoutQualified=payload.countries_without_qualified_offers||[];
  $("coverageNote").textContent=`${connected} مصدرًا مرتبطًا داخل شنغن: ${liveCount} داخل مخزون الصفقات و${extraCount} للمراقبة أو التهيئة؛ ${displayed} لديها صفقات مؤهلة معروضة`+
    ` · تغطية المخزون ${connectedCountries}/${payload.schengen_country_total||29} دولة، والصفقات المؤهلة من ${displayedCountries}`+
    (withoutQualified.length?` · متصلة بلا صفقة مؤهلة حاليًا (${withoutQualified.join("، ")})`:"")+
    (deferred?` · ${deferred} داخل المخزون بلا صفقة مؤهلة الآن (${deferredSources.join("، ")})`:"")+
    (watchOnly.length?` · مراقبة فقط (${watchOnly.join("، ")})`:"")+
    (staging.length?` · قيد التطبيع قبل الحساب (${staging.join("، ")})`:"")+
    (VERIFICATION_FRESH?` · المؤكد حيًا الآن: ${payload.live_verified_offer_count||0}`:
      " · انتهت صلاحية فحص الروابط؛ لن تُعرض روابط على أنها حية حتى يكتمل التحديث التالي")+
    ` · الأسعار الجزائرية من سوق Ouedkniss`;
  apply();
}
function apply(){
  const q=$("q").value.trim().toLowerCase(),c=$("fc").value,src=$("fsrc").value,f=$("ff").value,y=$("fy").value,
        p=$("fp").value,t=$("ft").checked,liveOnly=$("flive").checked,newOnly=$("fnew").checked,
        unseenOnly=$("funseen").checked,s=$("fs").value;
  let[pmin,pmax]=p?p.split("-").map(Number):[0,Infinity];
  const bmax=Number($("fb").value)||0;
  VIEW=DATA.filter(o=>
    o.v!==-1&&
    (!q||(o.t+" "+o.m).toLowerCase().includes(q))&&
    (!c||o.c===c)&&(!src||o.s===src)&&(!f||FUEL_AR(o.f)===f)&&(!y||String(o.y)===y)&&
    o.p>=pmin&&o.p<=pmax&&(!t||!o.e)&&(!liveOnly||(VERIFICATION_FRESH&&o.v===1))&&
    (!newOnly||NEW_IDS.has(String(o.id||"")))&&
    (!unseenOnly||!VISITED_IDS.has(String(o.id||"")))&&
    (!bmax||Number(o.ld||0)<=bmax));
  const K={best:(a,b)=>(a.a||0)-(b.a||0)||
             (b.ep||b.pr)-(a.ep||a.pr)||
             (b.cr||0)-(a.cr||0)||
             b.pr-a.pr||
             (b.er||b.roi)-(a.er||a.roi)||
             a.p-b.p||
             (a.km||0)-(b.km||0)||
             String(a.id||"").localeCompare(String(b.id||"")),
           profit:(a,b)=>b.pr-a.pr,roi:(a,b)=>b.roi-a.roi,price:(a,b)=>a.p-b.p,
           year:(a,b)=>b.y-a.y||b.pr-a.pr,km:(a,b)=>a.km-b.km||b.pr-a.pr};
  VIEW.sort(K[s]||K.best);
  const sourceMeta=SOURCE_META.get(src);
  if(src&&sourceMeta){
    const observed=new Date(sourceMeta.updated_utc).toLocaleString("ar-DZ",{dateStyle:"short",timeStyle:"short"});
    $("sourceNote").textContent=`${src}: ${nf.format(sourceMeta.row_count)} سجلًا مرتبطًا خارج حساب الصفقات. ${sourceMeta.note_ar}. آخر رصد: ${observed}`;
    $("sourceNote").classList.remove("hidden");
  }else if(src&&VIEW.length===0){
    $("sourceNote").textContent=`${src}: متصل بمخزون الصفقات، لكن لا توجد له صفقة مؤهلة للجزائر في آخر تصنيف مكتمل.`;
    $("sourceNote").classList.remove("hidden");
  }else{
    $("sourceNote").classList.add("hidden");
  }
  $("count").innerHTML=`عرض <b>${nf.format(VIEW.length)}</b> من ${nf.format(DATA.length)} صفقة`;
  render();
}
function card(o){
  const id=String(o.id||""),opened=VISITED_IDS.has(id),fresh=NEW_IDS.has(id);
  const roiCls=o.roi>=60?"hi":o.roi>=30?"md":"lo";
  const badge=VERIFICATION_FRESH&&o.v===1?'<span class="badge b-live">مؤكد حيًا ✓</span>':o.e?'<span class="badge b-est">سعر بيع تقديري</span>':'<span class="badge b-real">محسوب بسعر سوق حقيقي</span>';
  const historyBadge=fresh?'<span class="badge b-new">جديد ✦</span>':opened?'<span class="badge b-opened">فتحته سابقًا</span>':'';
  const analysisPrice=Number(o.ap||o.p||0);
  const exportPriceLine=analysisPrice>0&&analysisPrice<Number(o.p||0)?
    `<div>🧾 سعر التصدير المؤكد <b>${fmtEu(analysisPrice)}</b></div>`:'';
  const customsLines=Number(o.cd||0)>0?
    `<div>🛃 جمارك عند الاستيراد <b>${fmtDz(o.ci||o.cd)}</b></div>${Number(o.cb||0)>0?`<div>↩️ إرجاع الامتياز عند البيع <b>${fmtDz(o.cb)}</b></div>`:''}`:'';
  const href=safeUrl(o.u);
  const link=VERIFICATION_FRESH&&o.v===1&&href!=="#"?
    `<a class="open" data-offer-id="${esc(id)}" href="${esc(href)}" target="_blank" rel="noopener">${opened?"فتحه مجددًا":"فتح الإعلان"} ↗</a>`:
    '<span class="open unavailable" aria-disabled="true">الرابط غير مؤكّد</span>';
  return `<div class="card${fresh?" is-new":""}${opened?" is-visited":""}">
    <div class="top">
      <span class="flag">${FLAGS[o.c]||"🌍"}</span>
      <span class="chip">${esc(o.m||"—")}</span>${historyBadge}${badge}
      <span class="chip">${esc(o.s||"")}</span>
    </div>
    <div class="title">${esc(o.t||"—")}</div>
    <div class="profit">
      <span class="dz">+${fmtDz(o.prd)}</span><span class="eu">≈ ${fmtEu(o.pr)}</span>
      <span class="roi ${roiCls}">ROI ${Math.round(o.roi)}%</span>
    </div>
    <div class="meta">
      <div>💶 سعر الإعلان <b>${fmtEu(o.p)}</b></div>
      ${exportPriceLine}
      <div>🗓️ السنة <b>${o.y||"—"}</b></div>
      <div>🛣️ العداد <b>${o.km?nf.format(o.km)+" كم":"—"}</b></div>
      <div>⛽ الوقود <b>${FUEL_AR(o.f)}</b></div>
      ${customsLines}
      <div>🏛️ تكلفة الوصول <b>${fmtDz(o.ld)}</b></div>
      <div>🇩🇿 البيع المتوقع <b>${fmtDz(o.rd)}</b></div>
    </div>
    <div class="foot">
      <span class="src">الثقة ${o.cr||0}%</span>
      ${link}
    </div>
  </div>`;
}
function render(){
  const pages=Math.max(1,Math.ceil(VIEW.length/PER));
  page=Math.min(Math.max(1,page),pages);
  $("grid").innerHTML=VIEW.slice((page-1)*PER,page*PER).map(card).join("");
  $("pager").classList.toggle("hidden",VIEW.length<=PER);
  $("pageinfo").textContent=`صفحة ${page} / ${pages}`;
  $("prev").disabled=page<=1;$("next").disabled=page>=pages;
}

let refreshPoll=null,awaitingRefresh=false,requestedRefreshMode="smart",requestedJobId="";
function bytesHex(buffer){return [...new Uint8Array(buffer)].map(b=>b.toString(16).padStart(2,"0")).join("");}
async function signedRefreshHeaders(mode){
  if(!ACTIVE_PIN)throw new Error("locked");
  const material=await crypto.subtle.importKey("raw",new TextEncoder().encode(ACTIVE_PIN),"PBKDF2",false,["deriveBits"]);
  const rawKey=await crypto.subtle.deriveBits({name:"PBKDF2",salt:CONTROL_SALT,iterations:210000,hash:"SHA-256"},material,256);
  const hmacKey=await crypto.subtle.importKey("raw",rawKey,{name:"HMAC",hash:"SHA-256"},false,["sign"]);
  const stamp=String(Math.floor(Date.now()/1000));
  const nonce=bytesHex(crypto.getRandomValues(new Uint8Array(16)));
  const canonical=`${stamp}\n${nonce}\nPOST\n/api/refresh\n${mode}`;
  const signature=bytesHex(await crypto.subtle.sign("HMAC",hmacKey,new TextEncoder().encode(canonical)));
  return {"Content-Type":"application/json","X-Radar-Time":stamp,"X-Radar-Nonce":nonce,"X-Radar-Signature":signature};
}
function paintRefresh(state){
  const running=!!state.running||state.status==="pending"||state.status==="queued"||state.status==="running";
  if(running)awaitingRefresh=true;
  $("refreshBtn").disabled=running;$("fullRefreshBtn").disabled=running;
  $("refreshBtn").textContent=running&&state.mode==="smart"?"⏳ تحديث ذكي…":"⚡ جلب وتحديث ذكي";
  $("fullRefreshBtn").textContent=running&&state.mode==="full"?"⏳ تحديث شامل…":"🌍 تحديث شامل";
  if(state.message)$("refreshStatus").textContent=state.message;
  if(state.job_id)requestedJobId=state.job_id;
  if(!running&&state.status==="ok"){
    clearInterval(refreshPoll);refreshPoll=null;
    if(awaitingRefresh){
      awaitingRefresh=false;
      $("refreshStatus").textContent="تم التحديث — جاري إعادة تحميل اللوحة…";
      setTimeout(()=>location.reload(),15000);
    }else{
      $("refreshStatus").textContent="جاهز — آخر تحديث اكتمل بنجاح";
    }
  }else if(!running&&state.status==="failed"){
    clearInterval(refreshPoll);refreshPoll=null;
    $("refreshStatus").textContent=state.message||"فشل التحديث";
  }else if(!running&&state.status==="skipped"){
    clearInterval(refreshPoll);refreshPoll=null;awaitingRefresh=false;
    $("refreshStatus").textContent=state.message||"يوجد تحديث آخر يعمل الآن";
  }
}
async function readRefreshStatus(){
  try{const r=await fetch(`${CONTROL_API}/api/status`,{cache:"no-store"});if(r.ok)paintRefresh(await r.json());}catch(e){}
}
async function startRefresh(mode){
  requestedRefreshMode=mode;awaitingRefresh=true;$("refreshBtn").disabled=true;$("fullRefreshBtn").disabled=true;
  $("refreshStatus").textContent=mode==="full"?"بدء حصاد شامل لكل المصادر…":"بدء جلب العروض الجديدة وإعادة ترتيبها…";
  try{
    const headers=await signedRefreshHeaders(mode);
    const r=await fetch(`${CONTROL_API}/api/refresh`,{method:"POST",headers,body:JSON.stringify({mode})});
    const state=await r.json();paintRefresh(state);
    if(!r.ok)throw new Error(state.error||"request_failed");
    if(!refreshPoll)refreshPoll=setInterval(readRefreshStatus,10000);
  }catch(e){$("refreshBtn").disabled=false;$("fullRefreshBtn").disabled=false;$("refreshStatus").textContent="تعذر الاتصال بخدمة التحديث";}
}
$("refreshBtn").onclick=()=>startRefresh("smart");
$("fullRefreshBtn").onclick=()=>startRefresh("full");
readRefreshStatus();
setInterval(readRefreshStatus,60000);
</script>
